site_name: byte-of-nanobot
site_description: 简明 NanoBot 教程
site_url: https://sine-io.github.io/byte-of-nanobot/
repo_url: https://github.com/sine-io/byte-of-nanobot
docs_dir: docs-site
site_dir: site

theme:
  name: material
  language: zh
  palette:
    scheme: slate
    primary: cyan
    accent: deep purple
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate
    - search.suggest

plugins:
  - search

extra_css:
  - stylesheets/cyber-theme.css

markdown_extensions:
  - admonition
  - pymdownx.snippets:
      base_path:
        - .
  - pymdownx.highlight:
      linenums: true
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - 首页: README.md
  - 新手村:
      - 第 1 章：5 分钟跑起来: 01-quick-start.md
      - 第 2 章：用 Markdown 定义 Bot: 02-soul.md
      - 第 3 章：教 Bot 新技能: 03-skills.md
      - 第 4 章：先部署到 Telegram: 04-deploy.md
      - 第 5 章：做一个真实可用的 Bot: 05-first-real-bot.md
  - 进阶营:
      - 导读: build/README.md
      - 第 1 章：最简 Agent: build/01-simplest-agent.md
      - 第 2 章：工具系统: build/02-tool-system.md
      - 第 3 章：记忆与上下文: build/03-memory-and-context.md
      - 第 4 章：消息总线: build/04-message-bus.md
      - 第 5 章：技能与扩展: build/05-skills-and-beyond.md
      - 第 6 章：从 Mini Agent 到真实项目: build/06-from-mini-agent-to-real-bot.md
  - 附录:
      - 环境预检: appendix-environment-precheck.md
      - 常见坑与排障: appendix-troubleshooting.md
      - 进阶营配套示例: examples/part2/README.md
